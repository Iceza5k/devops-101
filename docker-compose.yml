services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: devops101/demo-app:1.0.0
    container_name: devops101-app
    environment:
      APP_MESSAGE: "Hello from Docker Compose"
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: devops101-nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
