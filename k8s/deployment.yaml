apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: devops-101
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: devops101/demo-app:1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_MESSAGE
              value: "Hello from Kubernetes"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
