apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-rollout
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/devops-101.git
    targetRevision: HEAD
    path: helm/demo-app
    helm:
      valueFiles:
        - values.yaml
        - values-rollout.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-101
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
